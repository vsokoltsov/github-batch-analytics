{{- if .Values.cleanup.failedSparkWorkers.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
  labels:
    {{- include "github-batch-analytics.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
  labels:
    {{- include "github-batch-analytics.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
  labels:
    {{- include "github-batch-analytics.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
  labels:
    {{- include "github-batch-analytics.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cleanup.failedSparkWorkers.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.cleanup.failedSparkWorkers.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cleanup.failedSparkWorkers.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.cleanup.failedSparkWorkers.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- include "github-batch-analytics.labels" . | nindent 12 }}
            app.kubernetes.io/component: spark-worker-cleanup
        spec:
          serviceAccountName: {{ include "github-batch-analytics.cleanupServiceAccountName" . }}
          restartPolicy: Never
          containers:
            - name: kubectl
              image: "{{ .Values.cleanup.failedSparkWorkers.image.repository }}:{{ .Values.cleanup.failedSparkWorkers.image.tag }}"
              imagePullPolicy: {{ .Values.cleanup.failedSparkWorkers.image.pullPolicy }}
              command:
                - /bin/sh
                - -ec
                - |
                  kubectl delete pod \
                    -n {{ .Release.Namespace }} \
                    -l app.kubernetes.io/component=spark-worker \
                    --field-selector=status.phase=Failed \
                    --ignore-not-found=true
{{- end }}
