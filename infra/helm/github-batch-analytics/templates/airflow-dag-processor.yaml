apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "github-batch-analytics.fullname" . }}-airflow-dag-processor
  labels:
    {{- include "github-batch-analytics.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: airflow-dag-processor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "github-batch-analytics.labels" . | nindent 8 }}
        app.kubernetes.io/component: airflow-dag-processor
    spec:
      serviceAccountName: {{ include "github-batch-analytics.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: airflow-dag-processor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-lc", "exec airflow dag-processor"]
          envFrom:
            - configMapRef:
                name: {{ include "github-batch-analytics.fullname" . }}-env
            - secretRef:
                name: {{ include "github-batch-analytics.fullname" . }}-secrets
          volumeMounts:
            - name: dlt-config
              mountPath: /home/airflow/.dlt/config.toml
              subPath: config.toml
            - name: dlt-secrets
              mountPath: /home/airflow/.dlt/secrets.toml
              subPath: secrets.toml
            - name: dlt-pipelines
              mountPath: /tmp/dlt
          resources:
            {{- toYaml .Values.airflow.resources.dagProcessor | nindent 12 }}
      volumes:
        - name: dlt-config
          configMap:
            name: {{ include "github-batch-analytics.fullname" . }}-dlt-config
        - name: dlt-secrets
          secret:
            secretName: {{ include "github-batch-analytics.fullname" . }}-dlt-secrets
        - name: dlt-pipelines
          emptyDir: {}
