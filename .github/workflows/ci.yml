name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (${{ matrix.linter }})
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: dags
    strategy:
      matrix:
        linter: [ty, black, ruff, sqlfluff]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run selected linter
        run: |
          if [ "${{ matrix.linter }}" = "ty" ]; then
            PYTHONPATH=dags uv run ty check dags/ tests/
          elif [ "${{ matrix.linter }}" = "black" ]; then
            uv run black --check dags/ tests/
          elif [ "${{ matrix.linter }}" = "ruff" ]; then
            uv run ruff check dags/ tests/
          elif [ "${{ matrix.linter }}" = "sqlfluff" ]; then
            uv run sqlfluff lint dags/gba/services/dashboards
          else
            echo "Unknown linter: ${{ matrix.linter }}"
            exit 1
          fi

  tests:
    name: Tests (${{ matrix.test_type }})
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      PYTHONPATH: dags
    strategy:
      matrix:
        test_type: [unit, integration]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run ${{ matrix.test_type }} tests
        run: uv run pytest -m ${{ matrix.test_type }} -q

  build-and-push:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'github-batch-analytics-airflow' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
