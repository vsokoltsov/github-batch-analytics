name: Terraform

on:
  push:
    paths:
      - "infra/terraform/**"
  pull_request:
    paths:
      - "infra/terraform/**"

jobs:
  fmt:
    name: Terraform Fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.3

      - name: Check formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive

  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.3

      - name: Initialize test dependencies
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Run terraform tests
        run: terraform -chdir=infra/terraform test -no-color

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [fmt, test]
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-central-1' }}
      TF_VAR_aws_profile: ""
      TF_VAR_landing_zone_bucket_name: ${{ vars.LANDING_ZONE_BUCKET_NAME }}
      TF_VAR_bronze_zone_bucket_name: ${{ vars.BRONZE_ZONE_BUCKET_NAME }}
      TF_VAR_silver_zone_bucket_name: ${{ vars.SILVER_ZONE_BUCKET_NAME }}
      TF_VAR_marts_bucket_name: ${{ vars.MARTS_BUCKET_NAME }}
      TF_VAR_dlt_state_bucket_name: ${{ vars.DLT_STATE_BUCKET_NAME }}
      TF_VAR_logging_bucket_name: ${{ vars.LOGGING_BUCKET_NAME }}
      TF_VAR_athena_query_results_bucket_name: ${{ vars.ATHENA_QUERY_RESULTS_BUCKET_NAME || 'gba-athena-results-prod' }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repository: ${{ github.event.repository.name }}
      TF_VAR_github_token: ${{ secrets.TERRAFORM_GITHUB_TOKEN }}
      TF_VAR_dlt_state_access_role_names: '["github-actions-ecr-push"]'
      TF_VAR_tags: '{"Project":"github-batch-analytics","Environment":"prod","ManagedBy":"terraform"}'
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write backend config
        run: |
          cat > infra/terraform/backend.hcl <<EOF
          bucket  = "${{ vars.TERRAFORM_STATE_BUCKET || 'gba-terraform-state-prod' }}"
          key     = "github-batch-analytics/infra/terraform.tfstate"
          region  = "${AWS_REGION}"
          encrypt = true
          EOF

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -reconfigure -backend-config=backend.hcl

      - name: Check terraform plan is clean
        run: |
          set +e
          terraform -chdir=infra/terraform plan -detailed-exitcode -no-color
          status=$?
          set -e

          if [ "$status" -eq 1 ]; then
            exit 1
          fi

          if [ "$status" -eq 2 ]; then
            echo "Terraform plan detected infrastructure drift or unapplied changes."
            exit 1
          fi
