services:
  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
    command: ["airflow", "db", "migrate"]
    restart: "no"

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
    ports:
      - "8080:8080"
    command: api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
      airflow-dag-processor:
        condition: service_started
    env_file: .env
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
      - spark-ivy-cache:/home/airflow/.ivy2
    command: scheduler
  
  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
    command: dag-processor

  spark-master:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    depends_on:
      postgres:
        condition: service_started
      airflow-scheduler:
        condition: service_started
      airflow-api-server:
        condition: service_started
    env_file: .env
    environment:
      PYTHONPATH: /opt/airflow/dags
      AWS_CONFIG_FILE: /home/spark/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/spark/.aws/credentials
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./.local/aws:/home/spark/.aws:ro

  spark-worker:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    depends_on:
      spark-master:
        condition: service_started
      airflow-scheduler:
        condition: service_started
      airflow-api-server:
        condition: service_started
      postgres:
        condition: service_started
    env_file: .env
    environment:
      PYTHONPATH: /opt/airflow/dags
      AWS_CONFIG_FILE: /home/spark/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/spark/.aws/credentials
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    volumes:
      - ./dags:/opt/airflow/dags
      - ./.local/aws:/home/spark/.aws:ro

volumes:
  postgres-db-volume:
  spark-ivy-cache:
