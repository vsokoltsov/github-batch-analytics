services:
  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    image: gba-airflow:local
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    env_file:
      - .env
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
      AWS_PROFILE: gba-admin
      AWS_CONFIG_FILE: /home/airflow/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/airflow/.aws/credentials
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
      - ./.dlt:/home/airflow/.dlt:ro
      - dlt-pipelines-volume:/tmp/dlt
    command:
      - bash
      - -lc
      - |
        mkdir -p /tmp/dlt/pipelines
        chown -R 50000:0 /tmp/dlt
        chmod -R 775 /tmp/dlt
        su airflow -s /bin/bash -c "/home/airflow/.local/bin/airflow db migrate"
    restart: "no"

  airflow-api-server:
    image: gba-airflow:local
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.spark
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
      AWS_PROFILE: gba-admin
      AWS_CONFIG_FILE: /home/airflow/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/airflow/.aws/credentials
      SPARK_MASTER_URL: spark://spark-master:7077
      DLT_DATA_DIR: /tmp/dlt
      DLT_TELEMETRY: false
      RUNTIME__DLTHUB_TELEMETRY: "false"
      ENABLE_RUNTIME_TRACE: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
      - ./.dlt:/home/airflow/.dlt:ro
      - dlt-pipelines-volume:/tmp/dlt
    ports:
      - "8080:8080"
    command: api-server
    restart: unless-stopped

  airflow-scheduler:
    image: gba-airflow:local
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
      airflow-dag-processor:
        condition: service_started
    env_file:
      - .env
      - .env.spark
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
      AWS_PROFILE: gba-admin
      AWS_CONFIG_FILE: /home/airflow/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/airflow/.aws/credentials
      SPARK_MASTER_URL: spark://spark-master:7077
      DLT_DATA_DIR: /tmp/dlt
      DLT_TELEMETRY: false
      RUNTIME__DLTHUB_TELEMETRY: "false"
      ENABLE_RUNTIME_TRACE: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
      - spark-ivy-cache:/home/airflow/.ivy2
      - ./.dlt:/home/airflow/.dlt:ro
      - dlt-pipelines-volume:/tmp/dlt
    command: scheduler
    restart: unless-stopped
  
  airflow-dag-processor:
    image: gba-airflow:local
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.spark
    environment:
      AIRFLOW_CONN_SPARK_DEFAULT: ${AIRFLOW_CONN_SPARK_DEFAULT:-spark://spark-master:7077?deploy-mode=client&spark_binary=spark-submit}
      PYTHONPATH: /opt/airflow/dags
      AWS_PROFILE: gba-admin
      AWS_CONFIG_FILE: /home/airflow/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/airflow/.aws/credentials
      SPARK_MASTER_URL: spark://spark-master:7077
      DLT_DATA_DIR: /tmp/dlt
      DLT_TELEMETRY: false
      RUNTIME__DLTHUB_TELEMETRY: "false"
      ENABLE_RUNTIME_TRACE: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./.local/aws:/home/airflow/.aws:ro
      - ./.dlt:/home/airflow/.dlt:ro
      - dlt-pipelines-volume:/tmp/dlt
    command: dag-processor
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    depends_on:
      postgres:
        condition: service_started
      airflow-scheduler:
        condition: service_started
      airflow-api-server:
        condition: service_started
    env_file: .env.spark
    environment:
      PYTHONPATH: /opt/airflow/dags
      AWS_CONFIG_FILE: /home/spark/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/spark/.aws/credentials
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./.local/aws:/home/spark/.aws:ro
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    depends_on:
      spark-master:
        condition: service_started
      airflow-scheduler:
        condition: service_started
      airflow-api-server:
        condition: service_started
      postgres:
        condition: service_started
    env_file: .env.spark
    environment:
      PYTHONPATH: /opt/airflow/dags
      AWS_CONFIG_FILE: /home/spark/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/spark/.aws/credentials
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    volumes:
      - ./dags:/opt/airflow/dags
      - ./.local/aws:/home/spark/.aws:ro
    restart: unless-stopped

  notebook:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    depends_on:
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    env_file: .env.spark
    environment:
      PYTHONPATH: /workspace
      HOME: /tmp/spark-home
      JUPYTER_CONFIG_DIR: /tmp/jupyter/config
      JUPYTER_DATA_DIR: /tmp/jupyter/data
      JUPYTER_RUNTIME_DIR: /tmp/jupyter/runtime
      IPYTHONDIR: /tmp/ipython
      AWS_PROFILE: ${AWS_PROFILE:-gba-admin}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_CONFIG_FILE: /home/spark/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/spark/.aws/credentials
      SPARK_MASTER_URL: spark://spark-master:7077
    working_dir: /workspace
    ports:
      - "8888:8888"
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /tmp/spark-home /tmp/jupyter/config /tmp/jupyter/data /tmp/jupyter/runtime /tmp/ipython && jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --IdentityProvider.token='' --ServerApp.password=''"
      ]
    volumes:
      - ./:/workspace
      - ./.local/aws:/home/spark/.aws:ro
      - ./.dlt:/home/airflow/.dlt:ro

volumes:
  postgres-db-volume:
  spark-ivy-cache:
  dlt-pipelines-volume:
